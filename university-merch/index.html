<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Университетский мерч</title>
    <!-- Подключаем Tailwind CSS (готовые стили) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Простая анимация для корзины */
      .cart-sidebar {
        position: fixed;
        right: -400px;
        top: 0;
        width: 400px;
        height: 100%;
        background: white;
        box-shadow: -2px 0 5px rgba(0, 0, 0, 0.1);
        transition: right 0.3s;
        z-index: 1000;
        padding: 20px;
        overflow-y: auto;
      }
      .cart-sidebar.open {
        right: 0;
      }
      .overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        display: none;
        z-index: 999;
      }
      .overlay.show {
        display: block;
      }
    </style>
  </head>
  <body class="bg-gray-100">
    <!-- Затемнение при открытой корзине -->
    <div class="overlay" id="overlay" onclick="closeCart()"></div>

    <!-- Шапка сайта -->
    <header class="bg-white shadow-md fixed top-0 left-0 right-0 z-50">
      <div
        class="container mx-auto px-4 py-4 flex justify-between items-center"
      >
        <h1 class="text-2xl font-bold text-blue-600">
          🎓 Университетский мерч
        </h1>
        <button onclick="toggleCart()" class="relative">
          <span class="text-2xl">🛒</span>
          <span
            id="cart-count"
            class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-5 h-5 text-xs flex items-center justify-center"
            >0</span
          >
        </button>
      </div>
    </header>

    <!-- Основной контент с товарами -->
    <main class="container mx-auto px-4 pt-24 pb-12">
      <h2 class="text-3xl font-bold mb-8 text-center">Наши товары</h2>

      <div
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"
        id="products-grid"
      >
        <!-- Товары будут добавлены через JavaScript -->
      </div>
    </main>

    <!-- Боковая панель корзины -->
    <div class="cart-sidebar" id="cart-sidebar">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-xl font-bold">Корзина</h2>
        <button
          onclick="closeCart()"
          class="text-gray-500 hover:text-gray-700 text-2xl"
        >
          &times;
        </button>
      </div>
      <div id="cart-items">
        <p class="text-gray-500 text-center">Корзина пуста</p>
      </div>
      <div class="mt-4 pt-4 border-t">
        <div class="flex justify-between font-bold mb-4">
          <span>Итого:</span>
          <span id="cart-total">0 ₽</span>
        </div>
        <button
          onclick="checkout()"
          class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700 transition"
        >
          Оформить заказ
        </button>
      </div>
    </div>

    <script>
      // Товары (добавьте свои)
      const products = [
        {
          id: 1,
          name: "Худи с логотипом",
          price: 2500,
          image: "https://via.placeholder.com/300x300?text=Худи",
        },
        {
          id: 2,
          name: "Футболка University",
          price: 1200,
          image: "https://via.placeholder.com/300x300?text=Футболка",
        },
        {
          id: 3,
          name: "Кепка с гербом",
          price: 800,
          image: "https://via.placeholder.com/300x300?text=Кепка",
        },
        {
          id: 4,
          name: "Толстовка оверсайз",
          price: 3000,
          image: "https://via.placeholder.com/300x300?text=Толстовка",
        },
        {
          id: 5,
          name: "Кружка университетская",
          price: 500,
          image: "https://via.placeholder.com/300x300?text=Кружка",
        },
        {
          id: 6,
          name: "Блокнот с символикой",
          price: 300,
          image: "https://via.placeholder.com/300x300?text=Блокнот",
        },
      ];

      // Корзина (хранится в памяти браузера)
      let cart = JSON.parse(localStorage.getItem("cart")) || [];

      // Сохранить корзину
      function saveCart() {
        localStorage.setItem("cart", JSON.stringify(cart));
        updateCartUI();
      }

      // Добавить в корзину
      function addToCart(productId) {
        const product = products.find((p) => p.id === productId);
        const existingItem = cart.find((item) => item.id === productId);

        if (existingItem) {
          existingItem.quantity++;
        } else {
          cart.push({ ...product, quantity: 1 });
        }

        saveCart();
        showNotification(`${product.name} добавлен в корзину!`);
      }

      // Удалить из корзины
      function removeFromCart(productId) {
        const item = cart.find((i) => i.id === productId);
        if (item && item.quantity > 1) {
          item.quantity--;
        } else {
          cart = cart.filter((item) => item.id !== productId);
        }
        saveCart();
      }

      // Обновить интерфейс корзины
      function updateCartUI() {
        // Обновляем счетчик
        const itemCount = cart.reduce((sum, item) => sum + item.quantity, 0);
        document.getElementById("cart-count").innerText = itemCount;

        // Обновляем список товаров в корзине
        const cartItemsDiv = document.getElementById("cart-items");
        if (cart.length === 0) {
          cartItemsDiv.innerHTML =
            '<p class="text-gray-500 text-center">Корзина пуста</p>';
          document.getElementById("cart-total").innerText = "0 ₽";
          return;
        }

        let total = 0;
        cartItemsDiv.innerHTML = cart
          .map((item) => {
            total += item.price * item.quantity;
            return `
                    <div class="flex gap-3 mb-3 pb-3 border-b">
                        <img src="${item.image}" class="w-16 h-16 object-cover rounded">
                        <div class="flex-1">
                            <h3 class="font-semibold">${item.name}</h3>
                            <p class="text-sm text-gray-600">${item.price} ₽ × ${item.quantity}</p>
                            <div class="flex gap-2 mt-1">
                                <button onclick="removeFromCart(${item.id})" class="text-xs bg-gray-200 px-2 py-1 rounded">−</button>
                                <span class="text-sm">${item.quantity}</span>
                                <button onclick="addToCart(${item.id})" class="text-xs bg-gray-200 px-2 py-1 rounded">+</button>
                            </div>
                        </div>
                        <div class="font-bold">${item.price * item.quantity} ₽</div>
                    </div>
                `;
          })
          .join("");

        document.getElementById("cart-total").innerText = total + " ₽";
      }

      // Открыть/закрыть корзину
      function toggleCart() {
        document.getElementById("cart-sidebar").classList.toggle("open");
        document.getElementById("overlay").classList.toggle("show");
      }

      function closeCart() {
        document.getElementById("cart-sidebar").classList.remove("open");
        document.getElementById("overlay").classList.remove("show");
      }

      // Оформление заказа
      function checkout() {
        if (cart.length === 0) {
          alert("Корзина пуста!");
          return;
        }

        const orderText = cart
          .map(
            (item) =>
              `${item.name} × ${item.quantity} = ${item.price * item.quantity} ₽`,
          )
          .join("\n");
        const total = cart.reduce(
          (sum, item) => sum + item.price * item.quantity,
          0,
        );

        // Отправка на почту (через mailto)
        const subject = encodeURIComponent("Заказ мерча");
        const body = encodeURIComponent(
          `Заказ:\n${orderText}\n\nИтого: ${total} ₽\n\nВаше ФИО: \nТелефон: \nАдрес:`,
        );
        window.location.href = `mailto:university@example.com?subject=${subject}&body=${body}`;

        alert("Заказ отправлен! Мы свяжемся с вами.");
        cart = [];
        saveCart();
        closeCart();
      }

      // Уведомление
      function showNotification(message) {
        const notification = document.createElement("div");
        notification.className =
          "fixed bottom-4 right-4 bg-green-500 text-white px-4 py-2 rounded shadow-lg z-50";
        notification.innerText = message;
        document.body.appendChild(notification);
        setTimeout(() => notification.remove(), 2000);
      }

      // Отображение товаров на странице
      function displayProducts() {
        const grid = document.getElementById("products-grid");
        grid.innerHTML = products
          .map(
            (product) => `
                <div class="bg-white rounded-lg shadow-md overflow-hidden hover:shadow-lg transition">
                    <img src="${product.image}" alt="${product.name}" class="w-full h-64 object-cover">
                    <div class="p-4">
                        <h3 class="text-xl font-semibold mb-2">${product.name}</h3>
                        <p class="text-2xl font-bold text-blue-600 mb-4">${product.price} ₽</p>
                        <button onclick="addToCart(${product.id})" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700 transition">
                            В корзину
                        </button>
                    </div>
                </div>
            `,
          )
          .join("");
      }

      // Запуск при загрузке страницы
      displayProducts();
      updateCartUI();
    </script>
  </body>
</html>
